name: QA defect
about: Record an evidence-backed PatchLens defect
labels: [bug, qa]
body:
  - type: input
    id: build
    attributes:
      label: Version or build
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Device and browser
      placeholder: iPhone 15 Plus — Safari
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open...
        2. Tap...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and notes
      description: Add screenshots, logs, and any relevant PatchLens report excerpt.
